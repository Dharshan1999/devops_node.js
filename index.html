<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🚀 My Node.js App</h1>
        <p>This is a responsive web app running on Node.js</p>

        <button onclick="showMessage()">Click Me</button>
        <p id="msg"></p>
    </div>

    <script>
        function showMessage() {
            document.getElementById("msg").innerText = "Hello from Node App!";
        }
    </script>

</body>
</html>
